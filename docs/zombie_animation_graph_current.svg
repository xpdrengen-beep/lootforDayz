<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Current Zombie_Main animation graph layout</title>
  <desc id="desc">Diagram of SM_ZombieMain with Idle, Scream, Walk, Run, Attack, Hit, and Death states plus source node mappings and transition conditions.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#991b1b" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #eef2ff; stroke: #6366f1; stroke-width: 3; rx: 18; }
      .future { fill: #fff7ed; stroke: #f97316; stroke-width: 3; rx: 18; }
      .source { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; rx: 14; }
      .state { fill: #ffffff; stroke: #334155; stroke-width: 3; rx: 18; }
      .oneshot { fill: #fef2f2; stroke: #dc2626; stroke-width: 3; rx: 18; }
      .dead { fill: #f1f5f9; stroke: #0f172a; stroke-width: 3; rx: 18; }
      .title { font: 700 38px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px Arial, sans-serif; fill: #475569; }
      .label { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 17px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 15px Arial, sans-serif; fill: #475569; }
      .transition { font: 700 17px Arial, sans-serif; fill: #1e293b; }
      .transition-red { font: 700 17px Arial, sans-serif; fill: #991b1b; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line-red { stroke: #991b1b; stroke-width: 3; fill: none; marker-end: url(#arrow-red); }
      .link { stroke: #0891b2; stroke-width: 2.5; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1100" />
  <text x="70" y="70" class="title">Zombie_Main.agr — SM_ZombieMain</text>
  <text x="70" y="105" class="subtitle">Nuværende graph: én hoved-State Machine. Solid pile = transitions. Stiplede pile = State child/source links.</text>

  <rect x="55" y="135" width="1045" height="795" class="panel" />
  <text x="85" y="180" class="label">State Machine: SM_ZombieMain</text>
  <text x="85" y="210" class="small">Default/root node bør være denne State Machine.</text>

  <!-- Source nodes outside state machine -->
  <rect x="1165" y="150" width="350" height="85" class="source" />
  <text x="1188" y="184" class="label">Src_Idle</text>
  <text x="1188" y="212" class="small">Locomotion.Normal.Idle · Loop</text>

  <rect x="1165" y="270" width="350" height="85" class="source" />
  <text x="1188" y="304" class="label">SRC_Scream</text>
  <text x="1188" y="332" class="small">Locomotion.Normal.Scream · Once</text>

  <rect x="1165" y="390" width="350" height="85" class="source" />
  <text x="1188" y="424" class="label">SRC_Walk</text>
  <text x="1188" y="452" class="small">Locomotion.Normal.Walk · Loop</text>

  <rect x="1165" y="510" width="350" height="85" class="source" />
  <text x="1188" y="544" class="label">Src_Run</text>
  <text x="1188" y="572" class="small">Locomotion.Normal.Run · Loop</text>

  <rect x="1165" y="650" width="350" height="85" class="source" />
  <text x="1188" y="684" class="label">SRC_Attack</text>
  <text x="1188" y="712" class="small">Combat.Normal.Attack · Once</text>

  <rect x="1165" y="770" width="350" height="85" class="source" />
  <text x="1188" y="804" class="label">SRC_Hit</text>
  <text x="1188" y="832" class="small">Combat.Normal.Hit · Once</text>

  <rect x="1165" y="890" width="350" height="85" class="source" />
  <text x="1188" y="924" class="label">SRC_Death</text>
  <text x="1188" y="952" class="small">Combat.Normal.Death · Once/Hold</text>

  <!-- States -->
  <rect x="180" y="300" width="205" height="105" class="state" />
  <text x="235" y="340" class="label">Idle</text>
  <text x="212" y="372" class="small">Child: Src_Idle</text>

  <rect x="470" y="215" width="230" height="120" class="oneshot" />
  <text x="532" y="255" class="label">Scream</text>
  <text x="496" y="287" class="small">Child: SRC_Scream</text>
  <text x="497" y="313" class="tiny">Time Storage: Normalized</text>

  <rect x="470" y="490" width="205" height="105" class="state" />
  <text x="528" y="530" class="label">Walk</text>
  <text x="498" y="562" class="small">Child: SRC_Walk</text>

  <rect x="790" y="490" width="205" height="105" class="state" />
  <text x="850" y="530" class="label">Run</text>
  <text x="820" y="562" class="small">Child: Src_Run</text>

  <rect x="260" y="705" width="205" height="105" class="future" />
  <text x="318" y="745" class="label">Attack</text>
  <text x="286" y="777" class="small">Child: SRC_Attack</text>

  <rect x="535" y="705" width="205" height="105" class="future" />
  <text x="604" y="745" class="label">Hit</text>
  <text x="568" y="777" class="small">Child: SRC_Hit</text>

  <rect x="810" y="705" width="205" height="105" class="dead" />
  <text x="870" y="745" class="label">Death</text>
  <text x="840" y="777" class="small">Child: SRC_Death</text>

  <!-- Locomotion transitions -->
  <path class="line" d="M385 360 C420 400, 430 470, 470 525" />
  <text x="265" y="480" class="transition">Speed &gt; 0.1 · Duration 0.2</text>

  <path class="line" d="M470 565 C420 585, 365 545, 310 405" />
  <text x="170" y="625" class="transition">Speed &lt;= 0.05 · Duration 0.2</text>

  <path class="line" d="M675 525 C720 505, 750 505, 790 525" />
  <text x="676" y="470" class="transition">Speed &gt; 0.75</text>
  <text x="700" y="493" class="tiny">Duration 0.2</text>

  <path class="line" d="M790 570 C750 615, 715 615, 675 570" />
  <text x="681" y="648" class="transition">Speed &lt; 0.65</text>
  <text x="707" y="671" class="tiny">Duration 0.2</text>

  <!-- Scream transitions -->
  <path class="line-red" d="M385 335 C420 300, 435 285, 470 275" />
  <text x="243" y="255" class="transition-red">DoScream · Duration 0.2</text>

  <path class="line-red" d="M520 335 C430 355, 390 350, 385 350" />
  <text x="374" y="198" class="transition-red">GoWalk &amp;&amp; Speed &lt;= 0.05</text>

  <path class="line-red" d="M585 335 C575 390, 573 430, 573 490" />
  <text x="605" y="392" class="transition-red">GoWalk &amp;&amp; Speed &gt; 0.1</text>
  <text x="605" y="417" class="transition-red">&amp;&amp; Speed &lt;= 0.75</text>

  <path class="line-red" d="M700 300 C825 320, 890 400, 895 490" />
  <text x="805" y="338" class="transition-red">GoWalk &amp;&amp; Speed &gt; 0.75</text>

  <!-- Future combat priority arrows -->
  <path class="line-red" d="M315 405 C300 515, 320 630, 350 705" />
  <text x="85" y="688" class="transition-red">Fremtid: DoAttack</text>

  <path class="line-red" d="M675 555 C720 610, 700 660, 650 705" />
  <text x="520" y="690" class="transition-red">Fremtid: WasHit</text>

  <path class="line-red" d="M995 545 C1060 595, 1040 675, 1010 725" />
  <text x="886" y="678" class="transition-red">Fremtid: IsDead</text>

  <!-- Child/source links -->
  <path class="link" d="M385 330 C670 160, 950 170, 1165 190" />
  <path class="link" d="M700 270 C880 250, 1010 275, 1165 310" />
  <path class="link" d="M675 520 C835 420, 1000 415, 1165 430" />
  <path class="link" d="M995 520 C1060 510, 1110 520, 1165 550" />
  <path class="link" d="M465 755 C690 675, 945 670, 1165 690" />
  <path class="link" d="M740 755 C895 770, 1015 790, 1165 810" />
  <path class="link" d="M1015 755 C1060 825, 1100 890, 1165 930" />

  <!-- Notes -->
  <rect x="55" y="965" width="1460" height="95" class="note" />
  <text x="85" y="1000" class="label">Workbench-checkliste</text>
  <text x="85" y="1030" class="small">1) Alle transitions skal bruge decimal Duration: 0.2 / 0.0 / 1.0.  2) Source-navne er case-sensitive.  3) Hver State skal linke til en child/source node.</text>
</svg>
